<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | IyonicPay - Secure Payment Platform</title>
  <meta name="description" content="Login to your IyonicPay account for secure access to your dashboard. Manage payments, view transactions, and enjoy advanced fintech features." />
  <meta name="keywords" content="IyonicPay login, payment platform, secure login, fintech dashboard, online payments, account access, financial technology, user authentication" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Login | IyonicPay - Secure Payment Platform" />
  <meta property="og:description" content="Access your IyonicPay account securely. Manage payments and view your dashboard with confidence." />
  <meta property="og:image" content="https://i.imgur.com/YAPRefp.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://iyonicpay.com/login" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Login | IyonicPay - Secure Payment Platform" />
  <meta name="twitter:description" content="Login to your IyonicPay account for secure access and manage your payments confidently." />
  <meta name="twitter:image" content="https://i.imgur.com/YAPRefp.png" />
  <link rel="canonical" href="https://iyonicpay.com/login" />
  <link rel="icon" href="https://i.imgur.com/YAPRefp.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top right, #e0e7ff, #ffffff, #f3f4f6);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .input-field {
      transition: all 0.3s ease;
      border: 1.5px solid #e5e7eb;
    }
    .input-field:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    /* Modern Preloader */
    .loader-wrapper {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid #6366f1;
      border-bottom-color: transparent;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-[440px] glass-card p-10 rounded-3xl shadow-2xl space-y-8 animate-in fade-in zoom-in duration-500">
    <div class="text-center space-y-2">
      <div class="bg-indigo-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-200 rotate-3 hover:rotate-0 transition-transform duration-300">
        <img src="https://i.imgur.com/YAPRefp.png" alt="IyonicPay Logo" class="w-12 h-12" />
      </div>
      <h2 class="text-4xl font-black text-slate-900 tracking-tight">Welcome Back</h2>
      <p class="text-slate-500 font-medium">Continue your journey with IyonicPay</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
        <input id="email" type="email" placeholder="name@company.com" class="w-full input-field rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium" required>
      </div>
      <div class="space-y-1.5">
        <div class="flex justify-between items-center px-1">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Password</label>
          <button type="button" onclick="document.getElementById('resetSection').classList.toggle('hidden')" class="text-xs font-bold text-indigo-600 hover:text-indigo-700">Forgot?</button>
        </div>
        <input id="password" type="password" placeholder="••••••••" class="w-full input-field rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium" required>
      </div>
      
      <button id="loginBtn" type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all shadow-xl shadow-slate-200 active:scale-[0.98]">
        Sign In to Dashboard
      </button>
    </form>

    <!-- Reset Password Section -->
    <div id="resetSection" class="hidden animate-in slide-in-from-top duration-300 border-t border-slate-100 pt-8 space-y-5">
      <div class="text-center">
        <h3 class="font-bold text-slate-800">Reset Password</h3>
        <p class="text-xs text-slate-500">We'll send a code to your email</p>
      </div>
      <input id="resetEmail" type="email" placeholder="Your account email" class="w-full input-field rounded-xl px-4 py-3 outline-none" />
      <button onclick="requestReset()" class="w-full bg-indigo-50 text-indigo-600 font-bold py-3 rounded-xl hover:bg-indigo-100 transition-all">Send Verification Code</button>

      <div class="grid grid-cols-1 gap-3 pt-2">
        <input id="resetCode" type="text" placeholder="6-digit code" class="w-full input-field rounded-xl px-4 py-3 outline-none" />
        <input id="newPassword" type="password" placeholder="New strong password" class="w-full input-field rounded-xl px-4 py-3 outline-none" />
        <button onclick="confirmReset()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-100">Update Password</button>
      </div>
    </div>

    <div class="text-center pt-4">
      <p class="text-sm text-slate-500 font-medium">
        New to IyonicPay? <a href="../signup" class="text-indigo-600 font-bold hover:underline underline-offset-4">Create account</a>
      </p>
    </div>
  </div>

  <!-- Modern Preloader -->
  <div id="loadingModal" class="loader-wrapper hidden">
    <span class="loader"></span>
    <p class="mt-6 text-slate-900 font-bold tracking-tight animate-pulse">Securing your session...</p>
    <p class="text-xs text-slate-400 mt-2">Just a moment</p>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const loadingModal = document.getElementById('loadingModal');

    loginForm.addEventListener('submit', async function (e) {
      e.preventDefault();

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      loadingModal.classList.remove('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      try {
        const res = await fetch('https://pay-xsn4.onrender.com/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = '../dashboard';
        } else {
          alert(data.msg || 'Login failed');
        }
      } catch (err) {
        alert('Server error. Try again later.');
      }

      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
      loadingModal.classList.add('hidden');
    });

    async function requestReset() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) return alert('Please enter your email.');

      try {
        const res = await fetch('https://pay-xsn4.onrender.com/api/auth/request-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();
        alert(data.msg || 'Check your email for the reset code.');
      } catch (err) {
        alert('Failed to send reset code.');
      }
    }

    async function confirmReset() {
      const email = document.getElementById('resetEmail').value.trim();
      const code = document.getElementById('resetCode').value.trim();
      const newPassword = document.getElementById('newPassword').value.trim();

      if (!email || !code || !newPassword) return alert('All fields are required.');

      try {
        const res = await fetch('https://pay-xsn4.onrender.com/api/auth/confirm-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code, newPassword })
        });

        const data = await res.json();
        if (res.ok) {
          alert('Password reset successful. Please log in.');
          location.reload();
        } else {
          alert(data.msg || 'Reset failed.');
        }
      } catch (err) {
        alert('Error during password reset.');
      }
    }
  </script>
  

</body>
</html>
