<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Iyonic Pay</title>
  <meta name="description" content="Create your Iyonic Pay account for secure, seamless, and instant online payments. Join Iyonic Pay to experience next-generation fintech solutions for your business or personal needs.">
  <meta name="keywords" content="Iyonic Pay, signup, registration, payment platform, secure payments, fintech, online payments, business payments, instant payments, seamless onboarding">
  <meta name="author" content="Iyonic Pay">
  <meta property="og:title" content="Sign Up | Iyonic Pay">
  <meta property="og:description" content="Create your Iyonic Pay account for secure, seamless, and instant online payments.">
  <meta property="og:image" content="https://i.imgur.com/YAPRefp.png">
  <meta property="og:url" content="https://iyonicpay.com/signup">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sign Up | Iyonic Pay">
  <meta name="twitter:description" content="Create your Iyonic Pay account for secure, seamless, and instant online payments.">
  <meta name="twitter:image" content="https://i.imgur.com/YAPRefp.png">
  <link rel="canonical" href="https://iyonicpay.com/signup" />
  <link rel="icon" href="https://i.imgur.com/YAPRefp.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at bottom left, #e0e7ff, #ffffff, #fdf2f8);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .input-field {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1.5px solid #e2e8f0;
    }
    .input-field:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      transform: translateY(-1px);
    }
    /* Modern Preloader */
    .loader-wrapper {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .loader {
      width: 56px;
      height: 56px;
      border: 4px solid #f59e0b;
      border-bottom-color: transparent;
      border-radius: 50%;
      display: inline-block;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .step-badge {
      @apply w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-16">

  <div class="w-full max-w-[520px] glass-card p-12 rounded-[2.5rem] shadow-2xl space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="text-center space-y-3">
      <div class="inline-block p-4 bg-white rounded-3xl shadow-sm mb-4">
        <img src="https://i.imgur.com/YAPRefp.png" alt="IyonicPay Logo" class="w-16 h-16" />
      </div>
      <h1 class="text-4xl font-black text-slate-900 tracking-tight leading-tight">Join the Future <br/>of Payments</h1>
      <p class="text-slate-500 font-medium text-lg">Create your IyonicPay account today</p>
    </div>

    <form id="signupForm" class="space-y-6">
      <div class="space-y-5">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Account Name</label>
          <input id="name" type="text" placeholder="e.g. Acme Corp" class="w-full input-field rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium" required>
        </div>
        
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
          <input id="email" type="email" placeholder="you@example.com" class="w-full input-field rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium" required>
        </div>

        <button id="sendCodeBtn" type="button" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 active:scale-[0.98]">
          Send Verification Code
        </button>

        <div id="extendedFields" class="space-y-5 hidden animate-in fade-in duration-500">
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Verification Code</label>
            <input id="verifyCode" type="text" placeholder="Enter 6-digit code" class="w-full input-field rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium uppercase tracking-[0.2em] text-center">
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
              <input id="password" type="password" placeholder="••••••••" class="w-full input-field rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium">
            </div>
            <div class="space-y-1.5">
              <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Confirm</label>
              <input id="confirm" type="password" placeholder="••••••••" class="w-full input-field rounded-2xl px-5 py-4 outline-none text-slate-700 font-medium">
            </div>
          </div>

          <button id="signupBtn" type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all shadow-xl shadow-slate-200 active:scale-[0.98]">
            Complete Registration
          </button>
        </div>
      </div>
    </form>

    <div class="text-center pt-2">
      <p class="text-sm text-slate-500 font-medium">
        Already have an account? <a href="../login" class="text-indigo-600 font-bold hover:underline underline-offset-4">Sign In</a>
      </p>
    </div>
  </div>

  <!-- Modern Preloader -->
  <div id="loadingModal" class="loader-wrapper hidden">
    <div class="relative">
      <span class="loader"></span>
      <div class="absolute inset-0 flex items-center justify-center">
        <img src="https://i.imgur.com/YAPRefp.png" class="w-6 h-6 opacity-50" />
      </div>
    </div>
    <p class="mt-8 text-slate-900 font-bold tracking-tight text-xl">Building your vault...</p>
    <p class="text-slate-400 font-medium mt-1">Deploying secure infrastructure</p>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const signupBtn = document.getElementById('signupBtn');
    const sendCodeBtn = document.getElementById('sendCodeBtn');
    const extendedFields = document.getElementById('extendedFields');
    const verifyCodeInput = document.getElementById('verifyCode');
    const loadingModal = document.getElementById('loadingModal');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');

    async function isNameTaken(name) {
      const res = await fetch(`https://pay-y3bt.onrender.com/api/auth/check-name?name=${encodeURIComponent(name)}`);
      const data = await res.json();
      return data.exists;
    }

    sendCodeBtn.addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!name || !email) return alert("Please enter both name and email.");

      const nameTaken = await isNameTaken(name);
      if (nameTaken) return alert("🚫 This name is already taken.");

      sendCodeBtn.disabled = true;
      sendCodeBtn.textContent = "Requesting code...";

      try {
        const res = await fetch('https://pay-y3bt.onrender.com/api/auth/signup/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });

        const data = await res.json();
        if (res.ok) {
          alert("✅ Verification code has been sent to your email.");
          sendCodeBtn.classList.add('hidden');
          extendedFields.classList.remove('hidden');
        } else {
          alert(data.msg || "Failed to send code.");
        }
      } catch (err) {
        console.error(err);
        alert("Server error while sending code.");
      }

      sendCodeBtn.disabled = false;
      sendCodeBtn.textContent = "Send Verification Code";
    });

    signupForm.addEventListener('submit', async function (e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirm = confirmInput.value;
      const code = verifyCodeInput.value.trim();

      if (!name || !email || !password || !confirm || !code) {
        return alert('Please complete all fields.');
      }

      if (password !== confirm) {
        return alert('Passwords do not match.');
      }

      signupBtn.disabled = true;
      signupBtn.textContent = 'Creating...';
      loadingModal.classList.remove('hidden');

      try {
        const res = await fetch('https://pay-y3bt.onrender.com/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, code })
        });

        const data = await res.json();

        if (res.ok && data.user && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '../dashboard';
        } else {
          alert(data.msg || 'Signup failed. Try again.');
        }
      } catch (err) {
        console.error('Signup error:', err);
        alert('❌ Server error. Try again later.');
      }

      signupBtn.disabled = false;
      signupBtn.textContent = 'Sign Up';
      loadingModal.classList.add('hidden');
    });
  </script>
  
<script>
    setInterval(() => {
      console.clear();
    }, 100);
  
    (function() {
      const devtools = /./;
      devtools.toString = function() {
        console.clear();
        console.log("DevTools detection activated!");
        return "";
      };
      console.log("%c", devtools);
    })();
  </script>


</body>
</html>
